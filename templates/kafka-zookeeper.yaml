apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: zookeeper
spec:
  ports:
  - port: 2181
    name: client
  clusterIP: None
  selector:
    app: zookeeper
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: zookeeper
spec:
  selector:
    matchLabels:
      app: zookeeper
  serviceName: zookeeper
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        app: zookeeper
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- include "fraud-detection.podSecurityContext" . | nindent 8 }}
      containers:
      - name: zookeeper
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.zookeeper.repository }}:{{ .Values.images.zookeeper.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        securityContext:
          {{- include "fraud-detection.containerSecurityContext" . | nindent 10 }}
        ports:
        - containerPort: 2181
          name: client
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        readinessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: {{ .Values.resources.zookeeper.requests.cpu }}
            memory: {{ .Values.resources.zookeeper.requests.memory }}
          limits:
            cpu: {{ .Values.resources.zookeeper.limits.cpu }}
            memory: {{ .Values.resources.zookeeper.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: kafka
spec:
  ports:
  - port: 9092
    name: plaintext
  - port: 29092
    name: internal
  clusterIP: None
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: kafka
spec:
  selector:
    matchLabels:
      app: kafka
  serviceName: kafka
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        app: kafka
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.global.imagePullSecrets }}
        - name: {{ .name }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- include "fraud-detection.podSecurityContext" . | nindent 8 }}
      containers:
      - name: kafka
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.kafka.repository }}:{{ .Values.images.kafka.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        securityContext:
          {{- include "fraud-detection.containerSecurityContext" . | nindent 10 }}
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 29092
          name: internal
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        readinessProbe:
          tcpSocket:
            port: 29092
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        livenessProbe:
          tcpSocket:
            port: 29092
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: {{ .Values.resources.kafka.requests.cpu }}
            memory: {{ .Values.resources.kafka.requests.memory }}
          limits:
            cpu: {{ .Values.resources.kafka.limits.cpu }}
            memory: {{ .Values.resources.kafka.limits.memory }}
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.persistence.kafka }}
