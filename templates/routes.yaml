{{- if .Values.openshift.route.enabled -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "fraud-detection.fullname" . }}-frontend
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: frontend
spec:
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "fraud-detection.fullname" . }}-backend
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    app: backend
spec:
  to:
    kind: Service
    name: backend
    weight: 100
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
